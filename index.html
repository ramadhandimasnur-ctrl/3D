<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BIM Viewer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="module">
        // Kita panggil library tanpa versi spesifik biar otomatis pakai yang paling baru dan jalan
        import * as OBC from 'https://esm.sh/@thatopen/components';
        
        const container = document.getElementById("viewer");
        const components = new OBC.Components();
        const worlds = components.get(OBC.Worlds);
        const world = worlds.create();
        
        world.scene = new OBC.SimpleScene(components);
        world.renderer = new OBC.SimpleRenderer(components, container);
        world.camera = new OBC.SimpleCamera(components);
        
        components.init();
        world.camera.controls.setLookAt(10, 10, 10, 0, 0, 0);
        world.scene.setup();
        
        // Setup khusus pembaca IFC
        const ifcLoader = components.get(OBC.IfcLoader);
        await ifcLoader.setup();
        ifcLoader.settings.wasm = {
            path: "https://unpkg.com/web-ifc@latest/",
            absolute: true
        };
        
        async function loadIfc() {
            try {
                console.log("Mencoba memuat model.ifc...");
                const response = await fetch("model.ifc");
                
                if (!response.ok) {
                    throw new Error("File model.ifc tidak ditemukan!");
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);
                
                // Load model dan masukkan ke dalam scene
                const model = await ifcLoader.load(buffer);
                world.scene.three.add(model);
                
                console.log("Mantap! Model 3D berhasil dimuat! 🔥");
            } catch (error) {
                console.error("Yah error lagi:", error);
            }
        }
        
        loadIfc();
    </script>
</body>
</html>
