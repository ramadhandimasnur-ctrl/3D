<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BIM Viewer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="module">
        // Pakai esm.sh yang anti-CORS
        import * as OBC from 'https://esm.sh/@thatopen/components@0.8.0';
        
        const container = document.getElementById("viewer");
        const components = new OBC.Components();
        const worlds = components.get(OBC.Worlds);
        const world = worlds.create();
        
        world.scene = new OBC.SimpleScene(components);
        world.renderer = new OBC.SimpleRenderer(components, container);
        world.camera = new OBC.SimpleCamera(components);
        
        components.init();
        world.camera.controls.setLookAt(10, 10, 10, 0, 0, 0);
        world.scene.setup();
        
        const fragments = components.get(OBC.FragmentsManager);
        
        async function loadIfc() {
            try {
                // Pastikan nama file di repo GitHub kamu sudah jadi model.ifc
                const response = await fetch("model.ifc");
                
                if (!response.ok) {
                    throw new Error("File model.ifc gagal ditarik. Cek lagi nama filenya di GitHub ya!");
                }
                
                const data = await response.arrayBuffer();
                const buffer = new Uint8Array(data);
                await fragments.load(buffer);
                console.log("Model 3D berhasil dimuat! 🔥");
            } catch (error) {
                console.error("Error:", error);
            }
        }
        
        loadIfc();
    </script>
</body>
</html>
